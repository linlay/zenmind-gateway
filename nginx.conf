worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location ^~ /admin/api {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /api/auth {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /api/app {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /oauth2 {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /openid {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /admin {
            set $auth_frontend http://app-server-frontend:80;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_pass $auth_frontend;
        }

        location ^~ /api/ap/ {
            set $agent_backend http://agent-platform-runner:8080;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_pass $agent_backend;
        }

        location ^~ /appterm {
            set $term_backend http://host.docker.internal:11947;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $term_backend;
        }

        location ^~ /term {
            set $term_backend http://host.docker.internal:11947;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $term_backend;
        }

        location / {
            return 404;
        }
    }
}
