worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    server {
        listen 80;
        server_name _;
        set $ma_backend http://host.docker.internal:11955;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/conf.d/term-backends.conf;
        include /etc/nginx/conf.d/pan-backends.conf;

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location ^~ /admin/api {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /api/auth {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /api/app {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /oauth2 {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /openid {
            set $auth_backend http://app-server-backend:8080;
            proxy_pass $auth_backend;
        }

        location ^~ /admin {
            set $auth_frontend http://app-server-frontend:80;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_pass $auth_frontend;
        }

        location = /ap/ws {
            include /etc/nginx/conf.d/ap-backend.conf;
            rewrite ^ /ws break;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $agent_backend;
        }

        location ^~ /ap/api/ {
            include /etc/nginx/conf.d/ap-backend.conf;
            rewrite ^/ap/api/(.*)$ /api/$1 break;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_pass $agent_backend;
        }

        location = /api/mcp/mock {
            set $mcp_mock_backend http://mcp-server-mock:8080/mcp;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $mcp_mock_backend;
        }

        location = /api/mcp/email {
            set $mcp_email_backend http://mcp-server-email:8080/mcp;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $mcp_email_backend;
        }

        location = /api/mcp/bash {
            set $mcp_bash_backend http://mcp-server-bash:8080/mcp;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $mcp_bash_backend;
        }

        location ^~ /api/voice/ {
            set $voice_backend http://voice-server:11953;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $voice_backend;
        }

        location = /pan {
            return 301 /pan/;
        }

        location = /apppan {
            return 301 /apppan/;
        }

        location = /pan/api {
            return 301 /pan/api/;
        }

        location = /apppan/api {
            return 301 /apppan/api/;
        }

        location = /pan/assets {
            return 301 /pan/assets/;
        }

        location = /apppan/assets {
            return 301 /apppan/assets/;
        }

        location = /ma {
            return 301 /ma/;
        }

        location ^~ /ma/ {
            rewrite ^/ma/(.*)$ /$1 break;
            proxy_redirect ~^(/.*)$ /ma$1;
            proxy_pass $ma_backend;
        }

       location ^~ /apppan {
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $apppan_backend;
        }

        location ^~ /pan {
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $pan_backend;
        }

        # /appterm ideally should hit the backend directly, but the current term
        # deployment still depends on the frontend proxy layer for app traffic.
        location ^~ /appterm {
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $appterm_backend;
        }

        location ^~ /term {
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $term_frontend;
        }

        location / {
            return 404;
        }
    }
}
