services:
  gateway:
    image: nginx:1.27-alpine
    container_name: zenmind-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GATEWAY_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - zenmind-network

networks:
  zenmind-network:
    external: true
