services:
  gateway:
    image: nginx:1.27-alpine
    container_name: zenmind-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-11945}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-backends/ap-backend.${AP_BACKEND_MODE:-container}.conf:/etc/nginx/conf.d/ap-backend.conf:ro
      - ./nginx-backends/term-backends.${TERM_BACKEND_MODE:-host}.conf:/etc/nginx/conf.d/term-backends.conf:ro
      - ./nginx-backends/pan-backends.${PAN_BACKEND_MODE:-host}.conf:/etc/nginx/conf.d/pan-backends.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zenmind-network

networks:
  zenmind-network:
    external: true
    name: zenmind-network
